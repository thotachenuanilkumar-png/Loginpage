<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-stack login & register form with user & admin page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="container">
        <div class="form-box active" id="login-form">
                 
                <form action="">
                    <h1>
                Login
                </h1> 
                         
                        <input type="email" name="email" placeholder="Email" required>
                        <input type="password" name="password" placeholder="Password" required>
                         <button type="submit" name="login">Login</button>
                        <p> Don't you have an account? <a href="#" onclick="showForm('register-form')">Register</a></p>
                </form>
        </div>


        <div class="form-box" id="register-form">
                 
                <form action="">
                    <h1>
                 Register
                </h1> 
                
                        <input type="text" name="name" placeholder="Name" required>
                        <input type="email" name="email" placeholder="Email" required>
                        <input type="password" name="password" placeholder="Password" required>
                        <select name="role" required>
                    <option value="">--select role--</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                             
                </select> 
                 <br>
                <br>
                <button type="submit" name="login">Register </button>
                        <p>Alredy have an account? <a href="#" onclick="showForm('login-form')"> Login</a></p>
                
                    </form>
        </div>
    </div>
     
        
<script src="script.js"></script>
        
</body>
</html>
